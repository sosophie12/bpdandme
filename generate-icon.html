<!-- Ouvre ce fichier dans un navigateur pour générer icon.png -->
<!-- Clic droit sur l'image → Enregistrer sous → icon.png -->
<!DOCTYPE html>
<html>
<body style="background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:white;">
<h2>Icône Sophie — 256x256</h2>
<canvas id="c" width="256" height="256" style="border:1px solid #555;border-radius:16px;"></canvas>
<br>
<a id="dl" download="icon.png" style="color:#9b72cf;font-size:1.2rem;cursor:pointer;">📥 Télécharger icon.png</a>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Background gradient
const bg = ctx.createLinearGradient(0,0,256,256);
bg.addColorStop(0, '#9b72cf');
bg.addColorStop(1, '#f2a7c3');
ctx.beginPath();
ctx.arc(128,128,120,0,Math.PI*2);
ctx.fillStyle = bg;
ctx.fill();

// Ears
ctx.fillStyle = '#FF8C42';
// Left ear
ctx.beginPath();
ctx.moveTo(65,50); ctx.lineTo(95,100); ctx.lineTo(35,100); ctx.closePath(); ctx.fill();
// Right ear
ctx.beginPath();
ctx.moveTo(191,50); ctx.lineTo(221,100); ctx.lineTo(161,100); ctx.closePath(); ctx.fill();

// Inner ears
ctx.fillStyle = '#FFD4A8';
ctx.beginPath();
ctx.moveTo(72,60); ctx.lineTo(90,92); ctx.lineTo(54,92); ctx.closePath(); ctx.fill();
ctx.beginPath();
ctx.moveTo(184,60); ctx.lineTo(206,92); ctx.lineTo(168,92); ctx.closePath(); ctx.fill();

// Head
ctx.fillStyle = '#FF8C42';
ctx.beginPath();
ctx.ellipse(128,135,75,65,0,0,Math.PI*2);
ctx.fill();

// White face
ctx.fillStyle = '#FFF5E6';
ctx.beginPath();
ctx.ellipse(128,150,50,45,0,0,Math.PI*2);
ctx.fill();

// Eyes
ctx.fillStyle = '#2D1B00';
ctx.beginPath(); ctx.ellipse(105,125,10,12,0,0,Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.ellipse(151,125,10,12,0,0,Math.PI*2); ctx.fill();

// Eye shine
ctx.fillStyle = 'white';
ctx.beginPath(); ctx.arc(108,121,4,0,Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(154,121,4,0,Math.PI*2); ctx.fill();

// Nose
ctx.fillStyle = '#2D1B00';
ctx.beginPath(); ctx.ellipse(128,145,7,5,0,0,Math.PI*2); ctx.fill();

// Mouth
ctx.strokeStyle = '#2D1B00';
ctx.lineWidth = 2;
ctx.lineCap = 'round';
ctx.beginPath();
ctx.moveTo(120,152);
ctx.quadraticCurveTo(128,162,136,152);
ctx.stroke();

// Cheeks
ctx.fillStyle = 'rgba(255,182,193,0.5)';
ctx.beginPath(); ctx.arc(90,142,10,0,Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(166,142,10,0,Math.PI*2); ctx.fill();

// Heart
ctx.save();
ctx.translate(128,195);
ctx.scale(0.55,0.55);
ctx.fillStyle = '#FF6B9D';
ctx.beginPath();
ctx.moveTo(0,-15);
ctx.bezierCurveTo(-10,-30,-35,-20,-35,-5);
ctx.bezierCurveTo(-35,10,-15,20,0,32);
ctx.bezierCurveTo(15,20,35,10,35,-5);
ctx.bezierCurveTo(35,-20,10,-30,0,-15);
ctx.fill();
ctx.restore();

// Download link
const dl = document.getElementById('dl');
dl.href = c.toDataURL('image/png');
</script>
</body>
</html>
