<!DOCTYPE html>
<html>
<body style="background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:white;gap:2rem;padding:2rem;">
<h2>🦊 Icônes PWA Sophie</h2>
<p style="color:#ccc;max-width:500px;text-align:center;">Ouvre cette page dans ton navigateur, les icônes se téléchargent automatiquement.<br>Place-les dans le dossier de l'app.</p>

<div style="display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;">
<div style="text-align:center;">
<h3>192×192</h3>
<canvas id="c192" width="192" height="192" style="border:1px solid #555;border-radius:16px;"></canvas>
<br><a id="dl192" download="icon-192.png" style="color:#9b72cf;cursor:pointer;">📥 Télécharger</a>
</div>
<div style="text-align:center;">
<h3>512×512</h3>
<canvas id="c512" width="512" height="512" style="border:1px solid #555;border-radius:16px;max-width:256px;"></canvas>
<br><a id="dl512" download="icon-512.png" style="color:#9b72cf;cursor:pointer;">📥 Télécharger</a>
</div>
<div style="text-align:center;">
<h3>192×192 Maskable</h3>
<canvas id="c192m" width="192" height="192" style="border:1px solid #555;border-radius:16px;"></canvas>
<br><a id="dl192m" download="icon-192-maskable.png" style="color:#9b72cf;cursor:pointer;">📥 Télécharger</a>
</div>
<div style="text-align:center;">
<h3>512×512 Maskable</h3>
<canvas id="c512m" width="512" height="512" style="border:1px solid #555;border-radius:16px;max-width:256px;"></canvas>
<br><a id="dl512m" download="icon-512-maskable.png" style="color:#9b72cf;cursor:pointer;">📥 Télécharger</a>
</div>
</div>

<script>
function drawFox(ctx, cx, cy, scale) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);

    // Fox ears
    ctx.fillStyle = '#FF8C42';
    ctx.beginPath(); ctx.moveTo(-63,-78); ctx.lineTo(-33,-28); ctx.lineTo(-93,-28); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(63,-78); ctx.lineTo(93,-28); ctx.lineTo(33,-28); ctx.closePath(); ctx.fill();
    // Inner ears
    ctx.fillStyle = '#FFD4A8';
    ctx.beginPath(); ctx.moveTo(-56,-68); ctx.lineTo(-38,-36); ctx.lineTo(-74,-36); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(56,-68); ctx.lineTo(78,-36); ctx.lineTo(40,-36); ctx.closePath(); ctx.fill();

    // Head
    ctx.fillStyle = '#FF8C42';
    ctx.beginPath(); ctx.ellipse(0,7,75,65,0,0,Math.PI*2); ctx.fill();

    // White face
    ctx.fillStyle = '#FFF5E6';
    ctx.beginPath(); ctx.ellipse(0,22,50,45,0,0,Math.PI*2); ctx.fill();

    // Eyes
    ctx.fillStyle = '#2D1B00';
    ctx.beginPath(); ctx.ellipse(-23,-3,10,12,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(23,-3,10,12,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(-20,-7,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(26,-7,4,0,Math.PI*2); ctx.fill();

    // Nose
    ctx.fillStyle = '#2D1B00';
    ctx.beginPath(); ctx.ellipse(0,17,7,5,0,0,Math.PI*2); ctx.fill();

    // Mouth
    ctx.strokeStyle = '#2D1B00'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-8,24); ctx.quadraticCurveTo(0,34,8,24); ctx.stroke();

    // Cheeks
    ctx.fillStyle = 'rgba(255,182,193,0.5)';
    ctx.beginPath(); ctx.arc(-38,14,10,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(38,14,10,0,Math.PI*2); ctx.fill();

    // Heart
    ctx.save(); ctx.translate(0,67); ctx.scale(0.55,0.55);
    ctx.fillStyle = '#FF6B9D';
    ctx.beginPath(); ctx.moveTo(0,-15);
    ctx.bezierCurveTo(-10,-30,-35,-20,-35,-5);
    ctx.bezierCurveTo(-35,10,-15,20,0,32);
    ctx.bezierCurveTo(15,20,35,10,35,-5);
    ctx.bezierCurveTo(35,-20,10,-30,0,-15);
    ctx.fill(); ctx.restore();

    ctx.restore();
}

function drawIcon(canvas, maskable) {
    const size = canvas.width;
    const ctx = canvas.getContext('2d');

    const bg = ctx.createLinearGradient(0,0,size,size);
    bg.addColorStop(0, '#9b72cf');
    bg.addColorStop(1, '#f2a7c3');

    if (maskable) {
        // Maskable: fill entire canvas, smaller fox (safe zone = 80% center)
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, size, size);
        drawFox(ctx, size/2, size/2 - size*0.02, size/340);
    } else {
        // Regular: rounded square
        const r = size * 0.156;
        ctx.beginPath();
        ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.quadraticCurveTo(size,0,size,r);
        ctx.lineTo(size,size-r); ctx.quadraticCurveTo(size,size,size-r,size);
        ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
        ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
        ctx.closePath();
        ctx.fillStyle = bg;
        ctx.fill();
        drawFox(ctx, size/2, size/2 - size*0.02, size/280);
    }
}

drawIcon(document.getElementById('c192'), false);
drawIcon(document.getElementById('c512'), false);
drawIcon(document.getElementById('c192m'), true);
drawIcon(document.getElementById('c512m'), true);

['192','512','192m','512m'].forEach(id => {
    document.getElementById('dl'+id).href = document.getElementById('c'+id).toDataURL('image/png');
});

// Auto-download all
setTimeout(() => {
    document.getElementById('dl192').click();
    setTimeout(() => document.getElementById('dl512').click(), 400);
    setTimeout(() => document.getElementById('dl192m').click(), 800);
    setTimeout(() => document.getElementById('dl512m').click(), 1200);
}, 1000);
</script>
</body>
</html>
